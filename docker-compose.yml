version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ticket_mysql
    restart: always
    environment:
      MYSQL_DATABASE: ticket_db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    
  n8n:
    image: n8nio/n8n:latest
    container_name: ticket_n8n
    restart: always
    ports:
      - "5679:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5679/
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - db
volumes:
  db_data:
  n8n_data: